 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade With Khan - Premium Live News</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Force container to grab all remaining vertical mobile space dynamically */
        .dynamic-feed-height {
            height: calc(100vh - 170px);
        }
    </style>
</head>
<body class="bg-[#0b0e11] text-gray-200 font-sans h-screen min-h-screen overflow-hidden flex flex-col justify-between p-3">

    <!-- TOP SECTION WRAPPER -->
    <div class="flex flex-col flex-grow">
        <!-- TOP HEADER -->
        <header class="text-center my-1 flex-shrink-0">
            <h1 class="text-xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-yellow-500">
                TERMINAL NEWS HUB
            </h1>
            <p class="text-gray-400 text-[10px] mt-0.5">100% Automated Institutional Intelligence</p>
        </header>

        <!-- PREMIUM NAVIGATION TABS -->
        <div class="max-w-xl w-full mx-auto mt-2 bg-[#161a1e] border border-[#2b3139] p-1 rounded-xl flex gap-1 shadow-lg flex-shrink-0">
            <button id="tabNews" onclick="switchTab('news')" class="flex-1 py-2 rounded-lg text-xs font-bold uppercase tracking-wider flex items-center justify-center gap-2 transition-all cursor-pointer bg-gradient-to-r from-amber-500 to-yellow-500 text-black shadow-md">
                <i class="fa-solid fa-rss animate-pulse"></i> Live Wire
            </button>
            <button id="tabCalendar" onclick="switchTab('calendar')" class="flex-1 py-2 rounded-lg text-xs font-bold uppercase tracking-wider flex items-center justify-center gap-2 transition-all cursor-pointer text-gray-400 hover:text-white hover:bg-gray-800/50">
                <i class="fa-solid fa-calendar-days"></i> Economic Calendar
            </button>
        </div>

        <!-- MAIN TERMINAL SCREEN CONTAINER (STRETCHED TO BOTTOM EDGE) -->
        <main class="max-w-xl w-full mx-auto mt-3 bg-[#161a1e] border border-[#2b3139] rounded-2xl p-3 shadow-2xl relative flex-grow dynamic-feed-height">
            
            <!-- SECTION 1: LIVE MARKET BREAKING NEWS -->
            <div id="contentNews" class="block h-full w-full">
                <div class="tradingview-widget-container h-full w-full">
                    <div class="tradingview-widget-container__widget h-full w-full"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                    {
                        "feedMode": "all_symbols",
                        "isTransparent": true,
                        "displayMode": "regular",
                        "width": "100%",
                        "height": "100%",
                        "colorTheme": "dark",
                        "locale": "en"
                    }
                    </script>
                </div>
            </div>

            <!-- SECTION 2: HIGH-IMPACT ECONOMIC CALENDAR -->
            <div id="contentCalendar" class="hidden h-full w-full">
                <div class="tradingview-widget-container h-full w-full">
                    <div class="tradingview-widget-container__widget h-full w-full"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                    {
                        "colorTheme": "dark",
                        "isTransparent": true,
                        "width": "100%",
                        "height": "100%",
                        "locale": "en",
                        "importanceFilter": "-1,0,1" 
                    }
                    </script>
                </div>
            </div>

        </main>
    </div>

    <!-- FOOTER NAV LINK -->
    <footer class="w-full max-w-xl mx-auto text-center border-t border-[#2b3139] pt-2 mt-2 flex-shrink-0">
        <a href="menu.html" class="inline-flex items-center gap-2 text-xs text-amber-400 hover:underline">
            <i class="fa-solid fa-arrow-left"></i> Back to Hub Menu
        </a>
    </footer>

    <!-- INTERACTIVE ENGINE SCRIPT -->
    <script>
        function switchTab(mode) {
            const btnNews = document.getElementById('tabNews');
            const btnCal = document.getElementById('tabCalendar');
            const boxNews = document.getElementById('contentNews');
            const boxCal = document.getElementById('contentCalendar');

            if(mode === 'news') {
                btnNews.className = "flex-1 py-2 rounded-lg text-xs font-bold uppercase tracking-wider flex items-center justify-center gap-2 transition-all cursor-pointer bg-gradient-to-r from-amber-500 to-yellow-500 text-black shadow-md";
                btnCal.className = "flex-1 py-2 rounded-lg text-xs font-bold uppercase tracking-wider flex items-center justify-center gap-2 transition-all cursor-pointer text-gray-400 hover:text-white hover:bg-gray-800/50";
                boxNews.classList.remove('hidden');
                boxCal.classList.add('hidden');
            } else {
                btnCal.className = "flex-1 py-2 rounded-lg text-xs font-bold uppercase tracking-wider flex items-center justify-center gap-2 transition-all cursor-pointer bg-gradient-to-r from-rose-600 to-red-500 text-white shadow-md";
                btnNews.className = "flex-1 py-2 rounded-lg text-xs font-bold uppercase tracking-wider flex items-center justify-center gap-2 transition-all cursor-pointer text-gray-400 hover:text-white hover:bg-gray-800/50";
                boxCal.classList.remove('hidden');
                boxNews.classList.add('hidden');
            }
        }
    </script>

</body>
</html>
