<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | TWK</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background: #0b0e11; color: white; font-family: sans-serif; padding: 20px;">

    <button onclick="location.href='dashboard.html'" style="background:none; border:1px solid #474d57; color:white; padding:8px 15px; border-radius:5px; cursor:pointer;">← Back</button>

    <div style="max-width: 400px; margin: 40px auto; background: #181a20; padding: 30px; border-radius: 15px; border: 1px solid #2b2f36; text-align: center;">
        
        <div style="position: relative; width: 100px; height: 100px; margin: 0 auto 15px; cursor: pointer;" onclick="document.getElementById('imgInput').click()">
            <img id="user-photo" src="https://via.placeholder.com/150" style="width: 100%; height: 100%; border-radius: 50%; border: 3px solid #f0b90b; object-fit: cover;">
            <div style="position: absolute; bottom: 0; right: 0; background: #f0b90b; color: black; border-radius: 50%; width: 25px; height: 25px; font-weight: bold; line-height: 25px;">+</div>
        </div>
        <input type="file" id="imgInput" style="display:none;" accept="image/*" onchange="uploadPhoto()">

        <h3 id="display-name" style="margin: 10px 0;">Loading...</h3>
        <p id="display-email" style="color: #848e9c; font-size: 14px;">Email loading...</p>

        <div style="text-align: left; margin-top: 25px; border-top: 1px solid #2b2f36; padding-top: 15px;">
            <div style="display: flex; justify-content: space-between; padding: 10px 0;">
                <span style="color: #848e9c;">Real Balance</span>
                <span id="real-bal" style="color:#f0b90b; font-weight: bold;">$0.00</span>
            </div>
        </div>

        <button onclick="handleLogout()" style="width: 100%; background: #f6465d; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 30px; cursor: pointer;">Logout From Terminal</button>
    </div>

    <script>
        const SUPABASE_URL = "https://rsjgrotznorgavudjpsp.supabase.co";
        const SUPABASE_KEY = "sb_publishable_0zxG8sugxvwEKpBMhII87Q_HBOqwtM9";
        // Client name consistent rakhein
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadProfile() {
            try {
                const { data: { user } } = await supabase.auth.getUser();
                if (!user) { window.location.href = "index.html"; return; }

                const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
                
                if (profile) {
                    document.getElementById('display-name').innerText = profile.full_name || "Trader";
                    document.getElementById('display-email').innerText = user.email;
                    document.getElementById('real-bal').innerText = "$" + (profile.real_balance || 0).toFixed(2);
                    if (profile.avatar_url) document.getElementById('user-photo').src = profile.avatar_url;
                }
            } catch (err) {
                console.error("Profile load fail:", err);
            }
        }

        async function handleLogout() {
            if(confirm("Kya aap logout karna chahte hain?")) {
                try {
                    await supabase.auth.signOut();
                    localStorage.clear(); // Session puri tarah clear karne ke liye
                    window.location.href = "index.html";
                } catch (error) {
                    console.error("Logout error:", error);
                    window.location.href = "index.html"; // Error ho tab bhi bhej dein
                }
            }
        }

        function uploadPhoto() {
            alert("Storage setup ke baad ye permanent save hogi!");
        }

        window.onload = loadProfile;
    </script>
</body>
</html>
