 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trade With Khan | Final Live V8</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background-color: #0b0e11; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .header { height: 50px; padding: 0 15px; background: #181a20; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2b2f36; flex-shrink: 0; }
        .logo-sq { width: 32px; height: 32px; border: 2px solid #f0b90b; border-radius: 4px; display: flex; justify-content: center; align-items: center; font-weight: bold; color: #f0b90b; font-size: 14px; }

        .asset-tabs { display: flex; background: #181a20; border-bottom: 1px solid #2b2f36; padding: 5px; gap: 8px; overflow-x: auto; flex-shrink: 0; }
        .tab { padding: 6px 12px; border-radius: 4px; font-size: 11px; cursor: pointer; background: #2b3139; color: #848e9c; white-space: nowrap; border: 1px solid transparent; }
        .tab.active { background: rgba(240, 185, 11, 0.1); color: #f0b90b; border: 1px solid #f0b90b; }

        .chart-window { flex-grow: 1; width: 100%; position: relative; background: #000; overflow: hidden; }

        .control-panel { background: #181a20; padding: 12px; border-top: 1px solid #2b2f36; flex-shrink: 0; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .box { background: #2b3139; padding: 6px; border-radius: 4px; border: 1px solid #474d57; }
        .box label { font-size: 9px; color: #848e9c; display: block; text-transform: uppercase; }
        .box input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 13px; padding-top: 2px; }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .t-btn { border: none; padding: 14px; border-radius: 6px; font-weight: bold; color: white; font-size: 15px; cursor: pointer; }
        .buy { background: #2ebd85; }
        .sell { background: #f6465d; }

        .data-area { height: 180px; background: #0b0e11; overflow-y: auto; padding: 10px; border-top: 1px solid #2b2f36; flex-shrink: 0; }
        .section-title { font-size: 12px; color: #f0b90b; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 15px; }
        th { text-align: left; color: #848e9c; border-bottom: 1px solid #2b2f36; padding-bottom: 5px; }
        td { padding: 8px 0; border-bottom: 1px solid #1e2329; }
        
        /* New Action Buttons */
        .action-btns { display: flex; gap: 5px; }
        .btn-m { background: #f0b90b; color: black; border: none; padding: 3px 6px; border-radius: 3px; cursor: pointer; font-weight: bold; font-size: 10px; }
        .btn-x { background: #474d57; color: white; border: none; padding: 3px 6px; border-radius: 3px; cursor: pointer; font-size: 10px; }

        .pnl-up { color: #2ebd85; font-weight: bold; }
        .pnl-down { color: #f6465d; font-weight: bold; }
    </style>
</head>
<body>

          <div class="header">
    <div class="logo-sq">TWK</div>
    <div style="text-align: right;">
        <select onchange="switchAccount(this.value)" style="background: #181a20; color: #FFD700; border: none; font-size: 10px; font-weight: bold; cursor: pointer; outline: none;">
            <option value="DEMO">DEMO ACCOUNT</option>
            <option value="REAL">REAL ACCOUNT</option>
        </select>
        <div id="user-balance" style="font-weight: bold; color: white; font-size: 14px;">$10,000.00</div>
    </div>
          </div>
 

    <div style="display: flex; gap: 10px; padding: 10px; background: #181a20; justify-content: center;">
        <button onclick="depositFunds()" style="background: #28a745; color: white; border: none; padding: 5px 15px; border-radius: 4px; font-size: 12px; cursor: pointer;">Deposit</button>
        <button onclick="requestWithdraw()" style="background: #dc3545; color: white; border: none; padding: 5px 15px; border-radius: 4px; font-size: 12px; cursor: pointer;">Withdraw</button>
    </div>
 

    <div class="asset-tabs">
        <div class="tab active" onclick="switchMarket('BINANCE:BTCUSDT', 'BTCUSDT', this)">BTC/USDT</div>
        <div class="tab" onclick="switchMarket('FX:EURUSD', 'EURUSD', this)">EUR/USD</div>
        <div class="tab" onclick="switchMarket('OANDA:XAUUSD', 'XAUUSD', this)">GOLD (XAU)</div>
    </div>

    <div class="chart-window">
        <div id="tv_chart_main" style="height: 100%; width: 100%;"></div>
    </div>

     <div class="control-panel">
        <div class="input-grid">
            <div class="box">
                <label>Leverage</label>
                <input type="number" id="tLev" value="10" min="1" max="1000">
            </div>
            <div class="box">
                <label>Amount</label>
                <input type="number" id="tAmt" value="100">
            </div>
            <div class="box">
                <label>Take Profit (TP)</label>
                <input type="number" id="tTP" placeholder="Price" step="0.01">
            </div>
            <div class="box">
                <label>Stop Loss (SL)</label>
                <input type="number" id="tSL" placeholder="Price" step="0.01">
            </div>
        </div>
      
        <div class="btn-row">
            <button class="t-btn buy" onclick="openTrade('BUY')">BUY</button>
            <button class="t-btn sell" onclick="openTrade('SELL')">SELL</button>
        </div>
    </div>

    <div class="data-area">
        <div class="section-title">Active Positions</div>
        <table>
            <thead>
                <tr>
                    <th>Asset</th>
                    <th>Entry</th>
                    <th>SL/TP</th>
                    <th>PNL</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="position-list"></tbody>
        </table>

        <div class="section-title">Trade History</div>
        <table>
            <thead>
                <tr>
                    <th>Asset</th>
                    <th>Side</th>
                    <th>Result</th>
                    <th>P/L</th>
                </tr>
            </thead>
            <tbody id="history-list"></tbody>
        </table>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let demoBalance = 10000;
let realBalance = 0;
let currentAccountType = 'DEMO';
let wallet = demoBalance; // Active balance jo trade mein use hoga
     
        let activeFullSymbol = 'BINANCE:BTCUSDT';
        let activeBaseSym = 'BTCUSDT';
        let livePrice = 0;
        let activeTrades = [];
        let tradeHistory = [];
        let ws;
             // Deposit Function
        function depositFunds() {
            let amount = prompt("Enter Demo Deposit Amount:", "1000");
            if (amount && !isNaN(amount)) {
                wallet += parseFloat(amount);
                updateBalanceUI();
                alert("Demo Funds Added!");
            }
        }

        // Withdraw Function
        function requestWithdraw() {
            let amount = prompt("Enter Withdrawal Amount:", "500");
            if (amount && amount <= wallet) {
                alert("Withdrawal Request Sent! Redirecting to Admin...");
                window.open(`https://wa.me/8403069708text=Withdrawal Request: $${amount}`);
            } else {
                alert("Invalid Amount or Low Balance!");
            }
        }

        // Balance UI Update function (Taaki har jagah balance update ho)
       function updateBalanceUI() {
    const balanceEl = document.getElementById('user-balance');
    if (balanceEl) {
        balanceEl.innerText = "$" + wallet.toLocaleString(undefined, {minimumFractionDigits: 2});
    }
}

                function initChart(fullSymbol) {
            new TradingView.widget({
                "autosize": true, 
                "symbol": fullSymbol, 
                "interval": "1",
                "theme": "dark", 
                "style": "1", 
                "container_id": "tv_chart_main",
                "hide_top_toolbar": false,    // Isse timeframe buttons aayenge
                "hide_side_toolbar": false,   // Isse Drawing Tools (Strategy lines) aayenge
                "allow_symbol_change": true,  // Isse aap chart par search kar payenge
                "withdateranges": true,       // Isse bottom mein date range aayegi
                "studies": [                  // Ye default Indicators add karega
                    "RSI@tv-basicstudies",
                    "MASimple@tv-basicstudies"
                ]
            });
        }

        function startPriceStream(symbol) {
            if (ws) ws.close();
            if (symbol.includes("USD") && !symbol.includes("USDT")) {
                let basePrice = symbol.includes("XAU") ? 2300 : 1.08; 
                setInterval(() => { livePrice = basePrice + (Math.random() * 0.01 - 0.005); updatePNLs(); }, 1000);
            } else {
                ws = new WebSocket(`wss://stream.binance.com:9443/ws/${symbol.toLowerCase()}@trade`);
                ws.onmessage = (e) => { livePrice = parseFloat(JSON.parse(e.data).p); updatePNLs(); };
            }
        }

        function switchMarket(full, base, el) {
            activeFullSymbol = full; activeBaseSym = base;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            initChart(full); startPriceStream(base);
        }

        function openTrade(side) {
            const amt = parseFloat(document.getElementById('tAmt').value);
            const tp = parseFloat(document.getElementById('tTP').value) || null;
            const sl = parseFloat(document.getElementById('tSL').value) || null;
            if (amt > wallet) return alert("Insufficient Balance");

            activeTrades.push({ id: Date.now(), sym: activeBaseSym, side: side, entry: livePrice, amt: amt, tp: tp, sl: sl });
            renderTables();
        }

        // REPLACE / MODIFY LOGIC
        function modifyTrade(id) {
            const newTP = parseFloat(document.getElementById('tTP').value);
            const newSL = parseFloat(document.getElementById('tSL').value);
            const index = activeTrades.findIndex(t => t.id === id);

            if (index > -1) {
                if (!isNaN(newTP)) activeTrades[index].tp = newTP;
                if (!isNaN(newSL)) activeTrades[index].sl = newSL;
                alert("Target Updated!");
                renderTables();
            }
        }

        function renderTables() {
            const posList = document.getElementById('position-list');
            posList.innerHTML = activeTrades.map(t => `
                <tr>
                    <td>${t.sym} <br><small style="color:${t.side==='BUY'?'#2ebd85':'#f6465d'}">${t.side}</small></td>
                    <td>${t.entry.toFixed(2)}</td>
                    <td style="font-size:9px">S:${t.sl||'--'}<br>T:${t.tp||'--'}</td>
                    <td id="pnl-${t.id}" class="pnl-up">0.00</td>
                    <td class="action-btns">
                        <button class="btn-m" onclick="modifyTrade(${t.id})" title="Replace/Modify">M</button>
                        <button class="btn-x" onclick="closeManual(${t.id})">X</button>
                    </td>
                </tr>
            `).join('');

            const histList = document.getElementById('history-list');
            histList.innerHTML = tradeHistory.map(h => `
                <tr>
                    <td>${h.sym}</td><td>${h.side}</td><td>CLOSED</td>
                    <td class="${h.pnl >= 0 ? 'pnl-up' : 'pnl-down'}">${h.pnl.toFixed(2)}</td>
                </tr>
            `).join('');
        }

                function updatePNLs() {
            // Safety Check: Agar price abhi tak load nahi hua toh calculation mat karo
            if (livePrice <= 0) return; 

            activeTrades.forEach((t, index) => {
                const pnlEl = document.getElementById(`pnl-${t.id}`);
                if (!pnlEl) return;
                
                let diff = (t.side === 'BUY') ? (livePrice - t.entry) : (t.entry - livePrice);
                let pnl = diff * (t.amt / t.entry);
                
                pnlEl.innerText = pnl.toFixed(2);
                pnlEl.className = pnl >= 0 ? "pnl-up" : "pnl-down";

                // Improved Auto Close Logic with Safety
                if (t.tp) {
                    if (t.side === 'BUY' && livePrice >= t.tp) finalize(index, pnl);
                    else if (t.side === 'SELL' && livePrice <= t.tp) finalize(index, pnl);
                }
                
                if (t.sl) {
                    if (t.side === 'BUY' && livePrice <= t.sl) finalize(index, pnl);
                    else if (t.side === 'SELL' && livePrice >= t.sl) finalize(index, pnl);
                }
            });
        }

         function finalize(index, pnl) {
    wallet += pnl;
    
    // Balance ko sahi bucket mein save karne ke liye
    if (currentAccountType === 'DEMO') {
        demoBalance = wallet;
    } else {
        realBalance = wallet;
    }
    
    updateBalanceUI();
    // ... baki ka trade history code
         }
         
            wallet += pnl;
            document.getElementById('wallet-balance').innerText = `Balance: $${wallet.toFixed(2)}`;
            tradeHistory.unshift({ ...activeTrades[index], pnl: pnl });
            activeTrades.splice(index, 1);
            renderTables();
        }

        function closeManual(id) {
            const idx = activeTrades.findIndex(t => t.id === id);
            if (idx > -1) {
                const pnl = parseFloat(document.getElementById(`pnl-${id}`).innerText);
                finalize(idx, pnl);
            }
        }

        initChart(activeFullSymbol); startPriceStream(activeBaseSym);
         
    </script>
</body>
</html>
