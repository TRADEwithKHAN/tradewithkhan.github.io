 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRADE WITH KHAN - Cloud Terminal</title>
    <style>
        body { background-color: #121417; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background-color: #1c1f26; padding: 40px; border-radius: 10px; width: 350px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { color: #ffcc00; margin-bottom: 5px; }
        p { color: #888; font-size: 14px; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #333; background: #2a2e38; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #ffcc00; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #e6b800; }
        .error { color: #ff4444; font-size: 13px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <h1>TRADE WITH KHAN</h1>
    <p>Cloud Terminal v3.1</p>
    
    <div id="errorMessage" class="error">Invalid Email or Password</div>

    <form id="loginForm">
        <input type="email" id="email" name="email" placeholder="ksarimul2@gmail.com" required>
        <input type="password" id="password" name="password" placeholder="********" required>
        <button type="submit">CONNECT TO CLOUD</button>
    </form>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMessage');

        // Frontend check for your specific credentials
        if (email === "ksarimul2@gmail.com" && password === "Sarimul@a1") {
            alert("Login Successful! Connecting to Terminal...");
            // Yahan aap dashboard ka link dal sakte hain
            window.location.href = "/dashboard.html"; 
        } else {
            errorDiv.style.display = 'block';
            errorDiv.innerText = "Invalid Email or Password";
        }
    });
</script>

</body>
</html>
