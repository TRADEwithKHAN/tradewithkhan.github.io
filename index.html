<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade With Khan | Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: #050505; color: white; font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at center, #1a1a00 0%, #050505 100%);
            overflow: hidden;
        }
        .container { text-align: center; }
        h1 { font-size: clamp(1.8rem, 8vw, 3rem); color: #FFD700; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 3px; font-weight: 900; text-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
        
        .btn-box { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .btn {
            padding: 16px 45px; font-size: 1rem; font-weight: 800;
            border-radius: 50px; cursor: pointer; transition: 0.4s;
            text-transform: uppercase; letter-spacing: 1px; min-width: 170px;
        }
        .login { background: transparent; color: #FFD700; border: 2px solid #FFD700; }
        .reg { background: #FFD700; color: black; border: none; box-shadow: 0 10px 20px rgba(255, 215, 0, 0.2); }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(255, 215, 0, 0.4); }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; backdrop-filter: blur(8px); z-index: 100; }
        .box { background: #111; padding: 40px; border-radius: 20px; border: 1px solid #FFD700; width: 90%; max-width: 340px; text-align: center; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: white; box-sizing: border-box; font-size: 1rem; outline: none; }
        input:focus { border-color: #FFD700; }
        .submit { width: 100%; padding: 15px; background: #FFD700; border: none; font-weight: 900; border-radius: 10px; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>Welcome to<br>Trade With Khan</h1>
    <div class="btn-box">
        <button class="btn login" onclick="show('login')">Login</button>
        <button class="btn reg" onclick="show('register')">Register</button>
    </div>
</div>

<div id="modal" class="modal" onclick="hide()">
    <div id="login-f" class="box" onclick="event.stopPropagation()" style="display:none">
        <h2 style="color:#FFD700; margin-bottom: 20px;">LOGIN</h2>
        <input type="email" id="le" placeholder="Email Address">
        <input type="password" id="lp" placeholder="Password">
        <button class="submit" onclick="login()">ENTER TERMINAL</button>
    </div>
    <div id="reg-f" class="box" onclick="event.stopPropagation()" style="display:none">
        <h2 style="color:#FFD700; margin-bottom: 20px;">REGISTER</h2>
        <input type="email" id="re" placeholder="Your Email">
        <input type="password" id="rp" placeholder="Set Password">
        <button class="submit" onclick="register()">CREATE ACCOUNT</button>
    </div>
</div>

<script>
    const supabaseUrl = 'https://rsjgrotznorgavudjpsp.supabase.co';
    const supabaseKey = 'sb_publishable_0zxG8sugxvwEKpBMhII87Q_HBOqwtM9';
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    function show(t) {
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('login-f').style.display = t === 'login' ? 'block' : 'none';
        document.getElementById('reg-f').style.display = t === 'register' ? 'block' : 'none';
    }

    function hide() { 
        document.getElementById('modal').style.display = 'none'; 
    }

    async function register() {
        const email = document.getElementById('re').value;
        const password = document.getElementById('rp').value;
        
        const { data, error } = await supabaseClient.auth.signUp({
            email: email,
            password: password
        });

        if (error) {
            alert("Error: " + error.message);
        } else if (data.user) {
            const { error: profileError } = await supabaseClient
                .from('profiles')
                .insert([
                    { 
                        id: data.user.id, 
                        full_name: "Trader", 
                        real_balance: 0,
                        demo_balance: 10000
                    }
                ]);

            if (profileError) {
                console.log("Profile Error:", profileError.message);
            }
            alert("Registration Successful! Please check your email for verification.");
        }
    }
     
    async function login() {
        const email = document.getElementById('le').value;
        const password = document.getElementById('lp').value;
        
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        
        if(error) {
            alert("Login Error: " + error.message);
        } else {
            alert("Login Successful!");
            window.location.href = "dashboard.html"; 
        }
    }
</script>
    
</body>
</html>
