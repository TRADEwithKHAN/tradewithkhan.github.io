 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade with Khan | Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #050505;
            --primary: #FFD700; 
            --secondary: #d4af37;
            --text: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            /* Dark Premium Gradient Background */
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(212, 175, 55, 0.1), transparent),
                radial-gradient(circle at 0% 0%, rgba(255, 215, 0, 0.05), transparent);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .hero-section {
            text-align: center;
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: clamp(1.8rem, 5vw, 3.5rem);
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #888;
            font-size: 1.1rem;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .main-btns {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1rem;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 1px;
            min-width: 180px;
        }

        .btn-login {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-login:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
        }

        .btn-reg {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #000;
            border: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .btn-reg:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.4);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .ui-box {
            background: #111;
            padding: 3rem;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .ui-box input {
            width: 100%; padding: 15px; margin-bottom: 15px;
            background: #1a1a1a; border: 1px solid #333; border-radius: 10px; color: #fff;
            font-size: 1rem; box-sizing: border-box;
        }

        .submit-btn {
            width: 100%; padding: 15px; background: var(--primary); border: none;
            color: #000; font-weight: 900; border-radius: 10px; cursor: pointer; font-size: 1rem;
        }

        .hidden { display: none; }
        .switch-p { margin-top: 20px; font-size: 0.9rem; color: #666; cursor: pointer; }
        .switch-p span { color: var(--primary); }

    </style>
</head>
<body>

    <div class="hero-section">
        <h1>Trade with Khan</h1>
        <p>Trading Terminal v2.0</p>
        
        <div class="main-btns">
            <button class="btn btn-login" onclick="openModal('login')">Login</button>
            <button class="btn btn-reg" onclick="openModal('register')">Register</button>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay" onclick="closeModal()">
        
        <div id="login-form" class="ui-box hidden" onclick="event.stopPropagation()">
            <h2 style="color:var(--primary)">Login to Terminal</h2>
            <div id="loginError" style="color: #ff4444; font-size: 0.8rem; margin-bottom: 10px; display: none;"></div>
            <input type="email" id="loginEmail" placeholder="Email Address">
            <input type="password" id="loginPassword" placeholder="Password">
            <button class="submit-btn" onclick="handleLogin()">ACCESS TERMINAL</button>
            <p class="switch-p" onclick="openModal('register')">New User? <span>Create Account</span></p>
        </div>

        <div id="register-form" class="ui-box hidden" onclick="event.stopPropagation()">
            <h2 style="color:var(--primary)">Create Account</h2>
            <div id="regError" style="color: #ff4444; font-size: 0.8rem; margin-bottom: 10px; display: none;"></div>
            <input type="email" id="regEmail" placeholder="Your Email">
            <input type="password" id="regPassword" placeholder="Set Password">
            <button class="submit-btn" onclick="handleRegister()">REGISTER NOW</button>
            <p class="switch-p" onclick="openModal('login')">Have an account? <span>Login</span></p>
        </div>

    </div>

    <script>
        const supabaseUrl = 'https://rsjgrotznorgavudjpsp.supabase.co';
        const supabaseKey = 'sb_publishable_0zxG8sugxvwEKpBMhII87Q_HBOqwtM9';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        function openModal(type) {
            document.getElementById('modal-overlay').style.display = 'flex';
            document.querySelectorAll('.ui-box').forEach(b => b.classList.add('hidden'));
            document.getElementById(type + '-form').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        async function handleRegister() {
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPassword').value;
            const { error } = await supabase.auth.signUp({ email, password: pass });
            if (error) alert(error.message);
            else { alert("Success! Check your email."); openModal('login'); }
        }

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
            if (error) {
                const errDiv = document.getElementById('loginError');
                errDiv.style.display = 'block';
                errDiv.innerText = error.message;
            } else {
                alert("Login Successful!");
                window.location.href = "dashboard.html";
            }
        }
    </script>
</body>
</html>
