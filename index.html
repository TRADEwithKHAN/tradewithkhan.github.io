 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRADE WITH KHAN | Terminal v3.1</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0b0e11; --card: #161a1e; --border: #2b2f36;
            --gold: #f0b90b; --bull: #00c076; --bear: #cf304a;
            --text: #eaecef;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--card); padding: 40px; border-radius: 12px; width: 85%; max-width: 400px; border: 1px solid var(--border); text-align: center; }
        .auth-card h1 { color: var(--gold); margin-bottom: 25px; letter-spacing: 2px; }
        .auth-input { width: 100%; padding: 15px; margin-bottom: 15px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: white; }
        .auth-btn { width: 100%; padding: 16px; background: var(--gold); color: black; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .terminal-header { display: flex; justify-content: space-between; padding: 15px; background: var(--card); border-bottom: 1px solid var(--border); }
        #chart-container { width: 100%; height: calc(100vh - 250px); background: var(--bg); position: relative; }
        #terminalCanvas { display: block; width: 100%; height: 100%; }
        .trade-controls { display: flex; gap: 10px; padding: 15px; background: var(--card); position: fixed; bottom: 0; width: 100%; box-sizing: border-box; }
        .btn-trade { flex: 1; padding: 18px; border: none; border-radius: 8px; font-weight: 800; color: white; }
        .buy { background: var(--bull); } .sell { background: var(--bear); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1>TRADE WITH KHAN</h1>
            <p style="color: #848e9c; margin-bottom: 20px;">Cloud Terminal v3.1</p>
            <input type="email" id="ksarimul2@gmail.com" class="auth-input" placeholder="ksarimul2@gmail.com">
            <input type="password" id="Sarimul@a1" class="auth-input" placeholder="Password">
            <button class="auth-btn" onclick="startTerminal()">CONNECT TO CLOUD</button>
            <p id="error-msg" style="color: var(--bear); font-size: 12px; margin-top: 15px;"></p>
        </div>
    </div>

    <div id="main-terminal" class="hidden">
        <div class="terminal-header">
            <div>
                <span style="font-size: 10px; color: #848e9c;">OPERATOR</span>
                <div id="display-name" style="font-weight: bold; color: var(--gold);">Sarimul</div>
            </div>
            <div style="text-align: right;">
                <span style="font-size: 10px; color: #848e9c;">LIVE PRICE</span>
                <div id="live-price" style="font-size: 18px; font-weight: bold; color: var(--gold);">$0.00</div>
            </div>
        </div>

        <div id="chart-container">
            <canvas id="terminalCanvas"></canvas>
        </div>

        <div class="trade-controls">
            <button class="btn-trade buy" onclick="placeTrade('BUY')">BUY</button>
            <button class="btn-trade sell" onclick="placeTrade('SELL')">SELL</button>
        </div>
    </div>

    <script>
        // --- 2. CLOUD CONFIG ---
        const SB_URL = "PASTE_YOUR_PROJECT_URL_HERE"; // <--- PASTE URL HERE
        const SB_KEY = "sb_publishable_0zxG8sugxvwEKpBMhII87Q_HBOqwtM9";
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        let price = 50000;
        let candles = [];

        async function startTerminal() {
            const email = document.getElementById('userEmail').value;
            const pass = document.getElementById('userPass').value;
            const msg = document.getElementById('error-msg');

            msg.innerText = "Authenticating...";

            // Sign in or Sign up automatically
            const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });

            if (error) {
                const { error: regErr } = await supabase.auth.signUp({ email, password: pass });
                if (regErr) msg.innerText = regErr.message;
                else msg.innerText = "Check your email to confirm registration!";
            } else {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-terminal').classList.remove('hidden');
                initChart();
            }
        }

        // --- 3. CHART ENGINE ---
        function initChart() {
            const canvas = document.getElementById('terminalCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;

            function animate() {
                price += (Math.random() - 0.5) * 20; // Constant movement
                document.getElementById('live-price').innerText = "$" + price.toFixed(2);
                
                // Drawing logic
                ctx.fillStyle = "#0b0e11";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Add your candlestick drawing here
                requestAnimationFrame(animate);
            }
            animate();
        }

        function placeTrade(side) {
            console.log("Trade Placed: " + side + " at " + price);
            // We will add the saveTradeToCloud logic in the next step!
        }
    </script>
</body>
</html>
